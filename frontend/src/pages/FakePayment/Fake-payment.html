<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake Payment Gateway</title>
<style>
  body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f3f3f3; }
  .card { background:white; padding:30px; border-radius:10px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
  button { padding:10px 25px; font-size:18px; cursor:pointer; margin-top:20px; }
</style>
</head>
<body>
  <div class="card">
    <h2 id="gateway-name">Fake Stripe Gateway</h2>
    <p>Amount: ₹<span id="amount"></span></p>
    <button id="pay-btn">Pay Now</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get("amount") || 0;
    document.getElementById("amount").innerText = amount;

    document.getElementById("pay-btn").onclick = () => {
      alert("Your order has been placed successfully ✅");
      window.close();
    };
  </script>
</body>
</html>
